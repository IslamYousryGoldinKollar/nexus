name: Android APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: apps/android

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        # Provides `gradle` on PATH; no project wrapper required. We could
        # commit a wrapper later, but installing here keeps the repo lean.
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Bootstrap Gradle wrapper (if missing)
        run: |
          if [ ! -x ./gradlew ]; then
            gradle wrapper --gradle-version 8.10 --no-daemon
          fi

      - name: Run JVM unit tests
        # Gates the APK build — if a unit test fails, no APK is produced.
        # Right now this covers CrashRecorder; expand as we add more
        # JVM-only logic.
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-report
          path: apps/android/app/build/reports/tests/
          retention-days: 14

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          # google-services.json isn't committed (FCM project secret).
          # build.gradle.kts applies google-services *conditionally* if the
          # file is present, so the build succeeds without it — push
          # notifications just won't fire on this APK.
          NEXUS_DISABLE_FCM: 'true'

      - name: Rename APK with short SHA
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/nexus-${{ github.sha }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-debug-apk
          path: apps/android/app/build/outputs/apk/debug/nexus-*.apk
          retention-days: 30
          if-no-files-found: error
