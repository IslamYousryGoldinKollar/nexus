name: Nexus cron pings

# Why this workflow exists:
#   Vercel's Hobby plan caps cron jobs at ONCE PER DAY, max 2 per project.
#   We have 5 cron endpoints (process-pending, auto-transcribe,
#   auto-reason, sync-approved-injaz, sync-inngest) that need to run on
#   2-minute / 30-minute cadences. GitHub Actions on the free tier can
#   schedule down to ~5 min reliably (the 1-min minimum is best-effort
#   and gets dropped under load), so we ping the public cron endpoints
#   from here.
#
#   Each endpoint accepts a no-auth GET when CRON_SECRET is unset
#   (current prod state). If we add CRON_SECRET later, swap the curls
#   to send `Authorization: Bearer ${{ secrets.CRON_SECRET }}`.
#
#   Cost: ~30s × 12 runs/hour × 24h = ~6h compute/day. GitHub Actions
#   free tier is 2000 min/month for private repos, unlimited for public.
#   This repo is private so we're using ~180 of 2000 min/month — fine.

on:
  schedule:
    # Every 5 minutes. GitHub trims schedules under heavy queue, so 5
    # is the practical floor. Drop to '*/2' once we move to a paid plan
    # or self-host the runner.
    - cron: '*/5 * * * *'
  workflow_dispatch:

# Don't fan out concurrent runs if a tick takes longer than 5 min.
concurrency:
  group: nexus-cron
  cancel-in-progress: false

jobs:
  pings:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      BASE: https://nexus-beta-coral.vercel.app
    steps:
      # Each step has its own timeout so one slow endpoint doesn't
      # starve the others. The `|| true` lets a temporary 5xx fail
      # without aborting the whole tick — the next tick (5 min later)
      # gets another shot.

      - name: process-pending
        run: |
          R=$(curl -s -w '\n[HTTP %{http_code} time %{time_total}s]' --max-time 60 "$BASE/api/cron/process-pending" || true)
          echo "$R"

      - name: auto-transcribe
        run: |
          R=$(curl -s -w '\n[HTTP %{http_code} time %{time_total}s]' --max-time 120 "$BASE/api/cron/auto-transcribe" || true)
          echo "$R"

      - name: auto-reason
        run: |
          R=$(curl -s -w '\n[HTTP %{http_code} time %{time_total}s]' --max-time 120 "$BASE/api/cron/auto-reason" || true)
          echo "$R"

      - name: sync-approved-injaz
        run: |
          R=$(curl -s -w '\n[HTTP %{http_code} time %{time_total}s]' --max-time 90 "$BASE/api/cron/sync-approved-injaz" || true)
          echo "$R"

      - name: wa-watchdog
        # Detects silent Baileys disconnects (bridge thinks it's connected
        # but no WhatsApp messages have arrived for >30 min) and POSTs
        # /restart on wa-bridge to spin a fresh container.
        env:
          ADMIN_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: |
          if [ -z "$ADMIN_KEY" ]; then
            echo "[wa-watchdog] ADMIN_API_KEY secret not set — skipping"
            exit 0
          fi
          R=$(curl -s -w '\n[HTTP %{http_code} time %{time_total}s]' --max-time 30 "$BASE/api/admin/wa-watchdog?key=$ADMIN_KEY" || true)
          echo "$R"
