app = "nexus-wa-bridge"
primary_region = "fra"  # Frankfurt — close to Supabase eu-central-1
kill_signal = "SIGTERM"
kill_timeout = "10s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  LOG_LEVEL = "info"
  WA_BRIDGE_AUTH_DIR = "/app/auth"
  PORT = "8080"

# Tiny internal HTTP server that exposes the live pairing QR as an
# auto-refreshing HTML page. Token-gated via ?t=<WA_BRIDGE_HMAC_SECRET>.
# Only needed during pairing; after that you can safely ignore it.
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[deploy]
  strategy = "immediate"  # re-pairing is disruptive — don't rolling-deploy

# Optional: attach a 1 GB volume for the hot auth cache. Not strictly
# required because we mirror auth to Supabase Storage, but it avoids
# re-hydrating on every restart.
# [mounts]
#   source = "wa_bridge_data"
#   destination = "/app/auth"
