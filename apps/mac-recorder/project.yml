name: NexusRecorder
options:
  bundleIdPrefix: com.goldinkollar
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    PRODUCT_BUNDLE_IDENTIFIER: com.goldinkollar.nexusrecorder
    CODE_SIGN_STYLE: Automatic
    # Set DEVELOPMENT_TEAM below to your Apple ID team id (optional for local dev)
    # DEVELOPMENT_TEAM: XXXXXXXXXX
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  NexusRecorder:
    type: application
    platform: macOS
    sources:
      - path: NexusRecorder
    info:
      path: NexusRecorder/Info.plist
      properties:
        LSUIElement: true
        NSMicrophoneUsageDescription: "Nexus Recorder needs microphone access to capture your voice during meetings."
        NSScreenCaptureUsageDescription: "Nexus Recorder needs Screen Recording access to capture meeting audio. No video is recorded."
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
    entitlements:
      path: NexusRecorder/NexusRecorder.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_NAME: NexusRecorder
        INFOPLIST_KEY_LSUIElement: YES
    dependencies: []
    scheme:
      testTargets: []
